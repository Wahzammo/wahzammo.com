<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrangle | Legacy Tools</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body {
      justify-content: flex-start;
    }
    .tool-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .tool-container {
      max-width: 700px;
      margin: 0 auto;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 3rem;
      backdrop-filter: var(--glass-blur);
    }
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 1.5rem;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #14b8a6;
      background: rgba(20, 184, 166, 0.05);
    }
    .upload-area i {
      font-size: 3rem;
      color: #14b8a6;
      margin-bottom: 1rem;
    }
    .btn {
      background: #14b8a6;
      color: #fff;
      border: none;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: var(--transition);
      display: none;
    }
    .btn:hover {
      background: #0d9488;
      box-shadow: 0 0 15px rgba(20, 184, 166, 0.4);
    }
    .btn:disabled {
      background: #475569;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #14b8a6;
      color: #14b8a6;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: var(--transition);
      display: none;
      margin-bottom: 1rem;
    }
    .btn-secondary:hover {
      background: rgba(20, 184, 166, 0.1);
    }
    .status {
      margin-top: 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .back-link {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: var(--text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition);
    }
    .back-link:hover {
      color: #fff;
    }
    .rename-options {
      display: none;
      margin-bottom: 1.5rem;
    }
    .rename-options h3 {
      font-size: 1rem;
      color: #14b8a6;
      margin-bottom: 1rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #14b8a6;
    }
    .form-group select option {
      background: #1a2238;
    }
    .file-list {
      display: none;
      margin-bottom: 1.5rem;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 0.75rem;
    }
    .file-list h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .file-entry {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .file-entry .original {
      color: var(--text-muted);
    }
    .file-entry .renamed {
      color: #14b8a6;
      font-weight: 600;
    }
    .file-entry .arrow {
      color: #475569;
      margin: 0 0.5rem;
    }
    .error { color: #ef4444; }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .tool-container { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <a href="/" class="back-link"><i class="ph ph-arrow-left"></i> Back to Shrine</a>

  <div style="margin-top: 5rem; width: 100%;">
    <div class="tool-header">
      <h1 style="color: #fff; font-size: 2.5rem; margin-bottom: 0.5rem;">Wrangle</h1>
      <p style="color: var(--text-muted);">Bulk rename files inside a ZIP archive, entirely in your browser.</p>
    </div>

    <div class="tool-container">
      <div class="upload-area" id="dropzone">
        <i class="ph ph-folder-simple-star"></i>
        <h3>Drop your ZIP file here</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.9rem;">or click to browse files</p>
        <input type="file" id="fileInput" accept=".zip" style="display: none;">
      </div>

      <div class="rename-options" id="renameOptions">
        <h3><i class="ph ph-pencil-simple"></i> Rename Settings</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Prefix</label>
            <input type="text" id="prefix" value="File" placeholder="e.g. Photo, Doc">
          </div>
          <div class="form-group">
            <label>Start Number</label>
            <input type="number" id="startNum" value="1" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Separator</label>
            <select id="separator">
              <option value="_">Underscore (_)</option>
              <option value="-">Dash (-)</option>
              <option value=".">Dot (.)</option>
              <option value=" ">Space</option>
            </select>
          </div>
          <div class="form-group">
            <label>Extension Override</label>
            <input type="text" id="extOverride" placeholder="Leave blank to keep original">
          </div>
        </div>
      </div>

      <button id="previewBtn" class="btn-secondary">Preview Renamed Files</button>

      <div class="file-list" id="fileList"></div>

      <button id="downloadBtn" class="btn">Download Renamed ZIP</button>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
