<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Warpspeed | Legacy Tools</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { justify-content: flex-start; }
    .tool-header { text-align: center; margin-bottom: 2rem; }
    .tool-container {
      max-width: 600px; margin: 0 auto;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 3rem; backdrop-filter: var(--glass-blur);
    }
    .input-group {
      display: flex; gap: 1rem; margin-bottom: 1.5rem;
    }
    .input-group input {
      flex: 1; padding: 1rem 1.5rem; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
      color: #fff; font-size: 1rem; font-family: inherit;
      transition: var(--transition); outline: none;
    }
    .input-group input:focus { border-color: #ef4444; }
    .btn {
      background: #ef4444; color: #fff; border: none;
      padding: 1rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 0.5rem;
    }
    .btn:hover { background: #dc2626; box-shadow: 0 0 15px rgba(239,68,68,0.4); }
    .btn:disabled { background: #475569; cursor: not-allowed; box-shadow: none; }
    
    .status-area {
      text-align: center; margin-top: 2rem; display: none;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1); border-left-color: #ef4444;
      border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .result { margin-top: 1rem; color: #10b981; font-weight: 600; }
    .error { margin-top: 1rem; color: #ef4444; }
    
    .back-link {
       position: absolute; top: 2rem; left: 2rem; color: var(--text-muted);
       text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: var(--transition);
    }
    .back-link:hover { color: #fff; }
    
    .backend-note {
      margin-top: 2rem; padding: 1rem; border-radius: 8px; background: rgba(239,68,68,0.05);
      border: 1px dashed rgba(239,68,68,0.3); font-size: 0.85rem; color: var(--text-muted); text-align: left;
    }
    .backend-note code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.4rem; border-radius: 4px; color: #fff; }
  </style>
</head>
<body>

  <a href="/" class="back-link"><i class="ph ph-arrow-left"></i> Back to Shrine</a>

  <div style="margin-top: 5rem; width: 100%;">
    <div class="tool-header">
      <h1 style="color: #fff; font-size: 2.5rem; margin-bottom: 0.5rem;">Warpspeed</h1>
      <p style="color: var(--text-muted);">Extract MP3 audio seamlessly from YouTube URLs via proxy.</p>
    </div>

    <div class="tool-container">
      <div class="input-group">
        <input type="url" id="ytUrl" placeholder="https://www.youtube.com/watch?v=..." required>
        <button id="convertBtn" class="btn"><i class="ph ph-lightning"></i> Convert</button>
      </div>

      <div class="status-area" id="statusArea">
        <div class="spinner" id="spinner"></div>
        <div id="statusText">Starting conversion...</div>
      </div>
      
      <div class="backend-note">
        <strong>Setup Note:</strong> This frontend requires your backend to be deployed at <code>/api/convert</code> to handle the <code>yt-dlp</code> logic. 
        Update the API endpoint in script.js once deployed.
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
